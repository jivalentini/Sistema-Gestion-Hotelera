<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Dar de Alta Huésped</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background-color: #fff; }
    h2 { text-align: center; margin-bottom: 25px; }
    form { max-width: 900px; margin: 0 auto; border: 1px solid #ccc; padding: 25px 40px;
          border-radius: 5px; background-color: #fafafa; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; column-gap: 20px; row-gap: 10px; }
    label { font-weight: bold; margin-bottom: 3px; display: inline-block; }
    label .req { color: red; }
    input, select { width: 95%; padding: 6px; font-size: 14px; }

    /* NUEVO: visualmente todos los textos se muestran en mayúsculas */
    input[type="text"], input[type="email"], textarea {
      text-transform: uppercase;
    }

    .direccion-group { display: flex; align-items: center; gap: 10px; }
    .direccion-group input { flex: 1; }
    .botones { text-align: center; margin-top: 25px; }
    button { padding: 8px 20px; margin: 0 5px; border: 1px solid #888;
            background-color: #eee; border-radius: 3px; cursor: pointer; font-size: 14px; }
    button:hover { background-color: #ddd; }
    .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; }
    .alert-success { color: green; font-weight: bold; text-align: center; }
    .alert-danger { color: red; font-weight: bold; text-align: center; }
  </style>
</head>

<body>
  <h2>Hotel Premier - Dar de Alta Huésped</h2>

  <!-- Mensaje info -->
  <div th:if="${infoMessage}" class="alert alert-info" role="alert">
    <p th:text="${infoMessage}"></p>
  </div>


  <!-- LISTA DE ERRORES 
<th:block th:if="${errorList != null}">
  <div class="alert alert-danger">
    <strong>ERROR!</strong>
    <ul>  <li data-th-each="err : ${errorList}"  data-th-text="${err}"></li> </ul>
  </div>
</th:block>
 Mensajes de éxito 
<div th:if="${mensajeExito}" class="alert alert-success" th:utext="${mensajeExito}"></div>
-->

  <!-- FORMULARIO PRINCIPAL -->
  <form th:action="@{/huespedes/guardar}" method="post" th:object="${huesped}">
    <div class="form-grid">

      <!-- Columna izquierda -->
      <div>
        <label>Nombre <span class="req">*</span></label>
        <input type="text" th:field="*{nombre}" required>
        <label>Apellido <span class="req">*</span></label>
        <input type="text" th:field="*{apellido}" required>

        <label>Tipo de documento <span class="req">*</span></label>
        <select th:field="*{tipoDocumento}" required>
          <option value="" disabled selected>Seleccione un tipo</option>
          <option th:each="tipo : ${tiposDocumento}"
                  th:value="${tipo}"
                  th:text="${tipo}"></option>
        </select>

        <label>Número de documento <span class="req">*</span></label>
        <input type="text" th:field="*{documento}" required>

        <label>CUIT</label>
        <input type="text" th:field="*{cuit}"
      placeholder="XX-XXXXXXXX-X"
      pattern="\d{2}-\d{8}-\d"
      title="Formato válido: XX-XXXXXXXX-X">
<small style="color:#666;"></small>

        <label>Fecha de nacimiento <span class="req">*</span></label>
        <input type="date" th:field="*{fechaNacimiento}" required>

        <label>Teléfono <span class="req">*</span></label>
        <input type="text" th:field="*{telefono}" required>

        <label>Email</label>
        <input type="email" th:field="*{email}">
      </div>

      <!-- Columna derecha -->
      <div>
        <label>Posición frente al IVA</label>
        <select th:field="*{posicionFrenteAlIva}">
          <option value="CONSUMIDOR_FINAL">Consumidor final (por omisión)</option>
          <option value="MONOTRIBUTO">Monotributista</option>
          <option value="RESPONSABLE_INSCRIPTO">Responsable inscripto</option>
        </select>

        <label>Ocupación</label>
        <input type="text" th:field="*{ocupacion}">

        <label>Dirección (calle) <span class="req">*</span></label>
        <input type="text" th:field="*{direccion.direccion}" required>

        <label>Número / Depto / Piso</label>
        <div class="direccion-group">
          <input type="text" th:field="*{direccion.numero}" placeholder="Número" required>
          <input type="text" th:field="*{direccion.depto}" placeholder="Depto">
          <input type="text" th:field="*{direccion.piso}" placeholder="Piso">
        </div>

        <label>Localidad <span class="req">*</span></label>
        <input type="text" th:field="*{direccion.localidad.nombre}" required>

        <label>Código Postal <span class="req">*</span></label>
        <input type="text" th:field="*{direccion.localidad.codigoPostal}" required>

        <label>Provincia <span class="req">*</span></label>
        <input type="text" th:field="*{direccion.localidad.provincia.nombre}" required>

        <label>País <span class="req">*</span></label>
        <input type="text" th:field="*{direccion.localidad.provincia.pais.nombre}" required>

        <label>Nacionalidad <span class="req">*</span></label> 
        <input type="text" th:field="*{direccion.nacionalidad}" required> 
      </div>
    </div>

    <!-- Botones -->
    <div class="botones">
      <button type="submit">Siguiente</button>
      
      <button type="button" onclick="abrirModalCancelar()">Cancelar</button>
    </div>
  </form>

<!-- MODAL ÉXITO -->
<div id="modal-exito" 
    th:if="${mostrarModalExito}" 
    style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%;
           background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
  <div style="background:white; padding:25px; border-radius:10px; width:380px; text-align:center;
              box-shadow:0 0 15px rgba(0,0,0,0.3);">
    <h3>Registro exitoso</h3>
    <p th:utext="${mensajeExito}"></p>

    <div style="margin-top:18px; display:flex; justify-content:center; gap:12px;">
      <!-- SI: limpiar formulario y quedarse en alta -->
      <form th:action="@{/huespedes/continuar}" method="post" style="display:inline;">
        <input type="hidden" name="respuesta" value="si"/>
        <button type="submit"
                style="padding:10px 22px; background:#1b4965; color:white; border:none; border-radius:6px;">
          SI
        </button>
      </form>

      <!-- NO: volver a index -->
      <form th:action="@{/huespedes/continuar}" method="post" style="display:inline;">
        <input type="hidden" name="respuesta" value="no"/>
        <button type="submit"
                style="padding:10px 22px; background:#6c6c6c; color:white; border:none; border-radius:6px;">
          NO
        </button>
      </form>
    </div>
  </div>
</div>


<!-- MODAL ERRORES DE VALIDACIÓN -->
<div id="modal-error"
    th:if="${mostrarModalError}"
    style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
    <div style="background:white; padding:25px; border-radius:10px; width:400px; text-align:center;">
        <h3 style="color:red;">ERROR</h3>

        <ul style="text-align:left;">
            <li th:each="err : ${errorList}" th:text="${err}"></li>
        </ul>

        <button onclick="cerrarError()"
                style="margin-top:20px; padding:10px; background:#1b4965; color:white; border:none; border-radius:6px;">
            ACEPTAR
        </button>
    </div>
</div>

<!-- MODAL DUPLICADO -->

<div id="modal-duplicado"
    th:if="${duplicado}"
    style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">

    <div style="background:white; padding:25px; border-radius:10px; width:400px; text-align:center;">

        <h3 style="color:#b45f00;">¡CUIDADO!</h3>
        <p th:text="${mensajeDuplicado}"></p>

        <div style="display:flex; justify-content:center; gap:15px; margin-top:20px;">

            <form th:action="@{/huespedes/aceptar-igualmente}" method="post">
                <input type="hidden" name="tipoDocumento" th:value="${huesped.tipoDocumento}">
                <input type="hidden" name="documento" th:value="${huesped.documento}">
                <button type="submit"
                        style="padding:8px 20px; background:#1b4965; color:white;
                              border:none; border-radius:6px;">
                    ACEPTAR IGUALMENTE
                </button>
            </form>

          <button type="button"
        onclick="corregirDocumento()" style="padding:8px 20px; background:#aaa; color:white; border:none; border-radius:6px; margin-left:10px;">
              CORREGIR
          </button>

        </div>
    </div>
</div>


<!-- MODAL CANCELAR -->
<div id="modal-cancelar"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
          background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
    <div style="background:white; padding:25px; border-radius:10px; width:350px; text-align:center;">
        <h3>¿Desea cancelar el alta del huésped?</h3>

        <!-- SI -->
        <form th:action="@{/huespedes/cancelar}" method="post" style="display:inline;">
            <input type="hidden" name="confirm" value="SI">
            <button type="submit"
                    style="padding:8px 20px; background:#b30000; color:white;
                          border:none; border-radius:6px;">
                SI
            </button>
        </form>

        <!-- NO -->
        <button type="button"
                onclick="cerrarCancelar()"
                style="padding:8px 20px; background:#aaa; color:white;
                      border:none; border-radius:6px; margin-left:10px;">
            NO
        </button>
    </div>
</div>



<script>

function corregirDocumento() {
    // cerrar modal duplicado
    document.getElementById("modal-duplicado").style.display = "none";

    // foco en Tipo de Documento
    const tipoDocumento = document.querySelector('[name="tipoDocumento"]');
    if (tipoDocumento) {
        tipoDocumento.focus();
    }
}

function cerrarError() {
    document.getElementById("modal-error").style.display = "none";
}

function cerrarDuplicado() {
    document.getElementById("modal-duplicado").style.display = "none";
}

function abrirModalCancelar() {
  document.getElementById("modal-cancelar").style.display = "flex";
}

function cerrarCancelar() {
  document.getElementById("modal-cancelar").style.display = "none";
}

    document.addEventListener("DOMContentLoaded", function() {
      document.querySelectorAll('input[type="text"], input[type="email"], textarea')
        .forEach(input => {
          input.addEventListener("input", function() {
            this.value = this.value.toUpperCase();
          });
        });
    });
</script>
<script th:inline="javascript">
  var focusField = /*[[${focusField} != null ? '${focusField}' : ''] ]*/ '';
  if (focusField) {
    // campo nombre en el form - ajusta selector según name en el modelo
    var el = document.querySelector('[name="' + focusField + '"]');
    if (el) el.focus();
  }
</script>

  <!-- Fragmento para JS -->
  <div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
  </div>

</body>
</html>
