<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/Base :: head('Buscar Huésped')"></head>

<body>
<div class="container-md my-5">

    <h1 class="text-center mb-4">Buscar Huésped</h1>


    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <p th:text="${errorMessage}"></p>
    </div>



    <form th:action="@{/huespedes/buscar}" method="post" class="mx-5">
        <div class="row mb-3">
            <div class="col-md-6 mb-2">
                <input type="text" class="form-control" name="apellido" placeholder="Apellido">
            </div>
            <div class="col-md-6 mb-2">
                <input type="text" class="form-control" name="nombre" placeholder="Nombre">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6 mb-2">
                <select class="form-select" name="tipoDocumento">
                    <option value="">Tipo de documento</option>
                    <option value="DNI">DNI</option>
                    <option value="LE">LE</option>
                    <option value="LC">LC</option>
                    <option value="PASAPORTE">Pasaporte</option>
                <!--<option value="Otro">Otro</option>-->
                </select>
            </div>
            <div class="col-md-6 mb-2">
                <input type="text" class="form-control" name="documento" placeholder="Número de documento">
            </div>
        </div>

        <div class="mb-4">
            <button class="btn btn-primary" type="submit">Buscar</button>
        </div>
    </form>


    <div th:if="${huespedes}">
        <h3 class="mb-3">Resultados encontrados</h3>

        <form th:action="@{/huespedes/siguiente}" method="post">
            <table class="table table-bordered table-striped">
                <thead>
                <tr>
                    <th>Seleccionar</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Tipo Documento</th>
                    <th>Número Documento</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="h : ${huespedes}">
                    <td>
                        <input type="radio" name="huespedSeleccionado" th:value="${h.documento}">

                    </td>
                    <td th:text="${h.nombre ?: ''}"></td>
                    <td th:text="${h.apellido ?: ''}"></td>
                    <td th:text="${h.tipoDocumento ?: ''}"></td>
                    <td th:text="${h.documento ?: ''}"></td>

                </tr>
                </tbody>
            </table>

            <div class="mt-3">
                <button class="btn btn-success" type="submit">SIGUIENTE</button>
            </div>
        </form>
    </div>

</div>

<div th:replace="fragments/Base :: scripts"></div>
</body>
</html>
