<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Seleccionar Ocupantes - Buscar</title>
    <style>
        body { font-family: Arial; padding:20px; }
        .panel { border:1px solid #ccc; padding:15px; border-radius:4px; margin-bottom:20px;}
        table { width:100%; border-collapse: collapse; margin-top:10px; }
        th, td { border:1px solid #ddd; padding:6px; text-align:left; }
        th { background:#f0f0f0; }
        .actions { margin-top:10px; }
        .btn { padding:6px 12px; cursor:pointer; }
        .error { color:red; margin-top:10px; font-weight:bold; }
        #modal-solapamiento { display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
        #modal-content { background:white; padding:20px; border-radius:5px; max-width:400px; text-align:center; }
        #modal-content button { margin:5px; }
    </style>
</head>
<body>

<h1>Seleccionar Ocupantes - Habitación N° <span th:text="${numero_habitacion}">--</span></h1>

<!-- FORMULARIO DE BÚSQUEDA -->
<div class="panel">
    <h3>Buscar Huésped</h3>
    <form th:action="@{/ocupacion/buscar}" method="post">
        <input type="hidden" name="reservaId" th:value="${reservaId}"/>
        <input type="hidden" name="numero_habitacion" th:value="${numero_habitacion}"/>
        <input type="hidden" name="fechaDesde" th:value="${fechaDesde}"/>
        <input type="hidden" name="fechaHasta" th:value="${fechaHasta}"/>

        <label>Nombre:</label> <input type="text" name="nombre" th:value="${nombre}"/>
        <label>Apellido:</label> <input type="text" name="apellido" th:value="${apellido}"/>
        <label>Tipo Doc:</label>
        <select name="tipoDocumento">
            <option value="" th:selected="${tipoDocumento==null}">--</option>
            <option value="DNI" th:selected="${tipoDocumento=='DNI'}">DNI</option>
            <option value="LE" th:selected="${tipoDocumento=='LE'}">LE</option>
            <option value="LC" th:selected="${tipoDocumento=='LC'}">LC</option>
            <option value="Pasaporte" th:selected="${tipoDocumento=='Pasaporte'}">Pasaporte</option>
        </select>
        <label>N° Doc:</label> <input type="text" name="documento" th:value="${documento}"/>
        <button type="submit" class="btn">Buscar</button>
    </form>
</div>

<!-- RESULTADOS -->
<div class="panel">
    <h3>Seleccione Responsable y Acompañantes</h3>
    
    <div th:if="${error}" class="error" th:text="${error}"></div>

  <form th:action="@{/ocupacion/seleccionar}" method="post">
    <input type="hidden" name="reservaId" th:value="${reservaId}"/>
    <input type="hidden" name="numero_habitacion" th:value="${numero_habitacion}"/>
    <input type="hidden" name="fechaDesde" th:value="${fechaDesde}"/>
    <input type="hidden" name="fechaHasta" th:value="${fechaHasta}"/>

    <!-- 🔑 Mantener parámetros de búsqueda -->
    <input type="hidden" name="nombreBusqueda" th:value="${nombre}"/>
    <input type="hidden" name="apellidoBusqueda" th:value="${apellido}"/>
    <input type="hidden" name="tipoDocumentoBusqueda" th:value="${tipoDocumento}"/>
    <input type="hidden" name="documentoBusqueda" th:value="${documento}"/>

    <table>
        <thead>
            <tr>
                <th>Responsable</th>
                <th>Acompañante</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Tipo Doc</th>
                <th>N° Doc</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${resultados}">
                <td>
    <input type="radio" name="responsablePago" th:value="${p.cuit}"
           th:checked="${cuitResponsable != null && p.cuit == cuitResponsable}"/>
</td>

<td>
    <input type="checkbox" name="acompanantes" th:value="${p.cuit}"
           th:checked="${cuitsAcompanantes != null and cuitsAcompanantes.contains(p.cuit)}"/>
</td>

                <td th:text="${p.nombre}"></td>
                <td th:text="${p.apellido}"></td>
                <td th:text="${p.tipoDocumento}"></td>
                <td th:text="${p.documento}"></td>
            </tr>
            <tr th:if="${resultados == null || #lists.isEmpty(resultados)}">
                <td colspan="6">No se encontraron resultados.</td>
            </tr>
        </tbody>
    </table>
    <div class="actions">
        <button type="submit" class="btn">Aceptar</button>
    </div>
</form>

<!-- MODAL FORZAR -->
<div id="modal-solapamiento" th:if="${solapamiento}">
    <div id="modal-content">
        <p th:text="${error}">Ya existe una reserva en este período</p>
        <form th:action="@{/ocupacion/forzar}" method="post" style="display:inline;">
            <input type="hidden" name="numero_habitacion" th:value="${numero_habitacion}"/>
            <input type="hidden" name="reservaId" th:value="${reservaId}"/>
            <input type="hidden" name="fechaDesde" th:value="${fechaDesde}"/>
            <input type="hidden" name="fechaHasta" th:value="${fechaHasta}"/>
            <input type="hidden" name="responsablePago" th:value="${cuitResponsable}"/>
            <div th:each="cuit : ${cuitsAcompanantes}">
                <input type="hidden" name="acompanantes" th:value="${cuit}"/>
            </div>
            <button type="submit" class="btn btn-danger">OCUPAR IGUAL</button>
        </form>
        <button type="button" class="btn" onclick="document.getElementById('modal-solapamiento').style.display='none'">VOLVER</button>
    </div>
</div>

<script th:if="${solapamiento}">
    document.getElementById('modal-solapamiento').style.display = 'flex';
    function closeModal() {
        document.getElementById('modal-solapamiento').style.display = 'none';
    }
</script>


</body>
</html>
