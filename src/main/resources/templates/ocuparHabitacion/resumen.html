<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Resumen Ocupación</title>
    <style>
        body { font-family: Arial, sans-serif; padding:20px; }
        .panel { border:1px solid #ccc; padding:18px; border-radius:4px; }
        table { width:100%; border-collapse: collapse; margin-top:12px; }
        th, td { border:1px solid #ddd; padding:8px; text-align:left; }
        th { background:#f0f0f0; }
        .actions { margin-top:14px; display:flex; gap:8px; justify-content:space-between; }
        .btn { padding:8px 14px; border:1px solid #999; background:#eee; cursor:pointer; }
    </style>
</head>
<body>
    <h1>Seleccionar Ocupantes - Habitación N° <span th:text="${numero_habitacion}">--</span></h1>

    <div class="panel">
        <h3>Estado de la Habitación</h3>

        <p><strong>Responsable:</strong>
            <span th:if="${responsable != null}" th:text="${responsable.nombre + ', ' + responsable.apellido + ', DNI: ' + responsable.documento}">Responsable</span>
            <span th:if="${responsable == null}"> - </span>
        </p>

        <p><strong>Ocupantes Asignados:</strong></p>
        <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Tipo de documento</th>
                <th>Número de documento</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="p : ${ocupantes}">
                <td th:text="${p.nombre}">Nombre</td>
                <td th:text="${p.apellido}">Apellido</td>
                <td th:text="${p.tipoDocumento}">DNI</td>
                <td th:text="${p.documento}">00000000</td>

              </tr>
              <tr th:if="${ocupantes == null || #lists.isEmpty(ocupantes)}">
                <td colspan="4">No hay ocupantes asignados.</td>
              </tr>
            </tbody>
        </table>

        <p style="margin-top:12px;"><strong>Lugares disponibles:</strong> <span th:text="${lugares_disponibles}">0</span></p>

        <div class="actions">
            <div>
                <!-- Seguir cargando: volver a la selección de la misma habitación (paso anterior) -->
                <form th:action="@{/ocupacion/buscar}" method="get" style="display:inline;">
    <input type="hidden" name="reservaId" th:value="${reservaId}"/>
    <input type="hidden" name="numero_habitacion" th:value="${numero_habitacion}"/>
    <input type="hidden" name="fechaDesde" th:value="${fechaDesde}"/>
    <input type="hidden" name="fechaHasta" th:value="${fechaHasta}"/>

    <!-- ENVIAR RESPONSABLE -->
    <input type="hidden" name="cuitResponsable" th:value="${responsable != null ? responsable.cuit : ''}"/>

    <!-- ENVIAR ACOMPAÑANTES -->
    <div th:each="p : ${ocupantes}">
        <input type="hidden" name="cuitsAcompanantes" th:value="${p.cuit}"/>
    </div>

    <button type="submit" class="btn">SEGUIR CARGANDO</button>
</form>
            </div>

            <div>
                <!-- Cargar otra habitación: volver al inicio del CU (ruta de tu flujo) -->
                <a th:href="@{/habitacion}" class="btn">CARGAR OTRA HABITACIÓN</a>
                <a th:href="@{ / }" class="btn">SALIR</a>
            </div>
        </div>

    </div>

    <div style="margin-top:10px;color:red;" th:if="${error}" th:text="${error}"></div>
</body>
</html>
