<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hotel Premier - Inicio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f1f1;
            margin: 0;
            padding: 0;
        }
        .container {
            margin: 40px auto;
            width: 80%;
            max-width: 1100px;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .user-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-icon {
            width: 70px;
            height: 70px;
            background: #000;
            border-radius: 50%;
        }
        .sections {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
            gap: 20px;
        }
        .section-box {
            width: 30%;
            padding: 20px;
            border: 2px solid #ccc;
            border-radius: 8px;
            text-align: center;
            background: #e6e6e6;
        }
        button {
            margin-top: 15px;
            width: 80%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #d1d1d1;
            cursor: pointer;
        }
        button:hover {
            background: #bfbfbf;
        }
        .disabled {
            background: #a0a0a0 !important;
            cursor: not-allowed !important;
        }

        /* MODAL */
        #modal-maintenance {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        #modal-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }
        #modal-box button {
            width: 60%;
            background: #1b4965;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>


<div class="container">
    <h1>Hotel Premier</h1>

    <!-- Barra superior -->
    <div class="top-bar">
        <div>
            <a href="/login"><button>Autenticar Usuario</button></a>
            <a href="/logout"><button>Salir</button></a>
        </div>

        <div class="user-box">
            <div class="user-icon"></div>
            <p>HOLA <b th:text="${session.usuario?.nombre}">Usuario</b></p>
        </div>
    </div>

    <!-- CUADROS PRINCIPALES -->
    <div class="sections">

        <!-- SECCION RESERVAS -->
        <div class="section-box">
            <h3>Reservas</h3>
            <button  onclick="maintenance()">LISTAR HABITACIONES</button>
            <!--<a href="/habitacion"><button>Reservar Habitación</button> </a>-->
        <form action="/habitacion" method="get">
                <input type="hidden" name="modo" value="reservar">
                <button type="submit" class="btn btn-warning">RESERVAR HABITACIÓN</button>
        </form>

        <form action="/habitacion" method="get">
            <input type="hidden" name="modo" value="ocupar">
            <button type="submit" class="btn btn-warning">OCUPAR HABITACIÓN</button>
        </form>

            <button onclick="maintenance()">LISTAR RESERVAS</button>
        </div>

        <!-- SECCION HUESPED -->
        <div class="section-box">
            <h3>Huéspedes</h3>
           <a href="/huespedes/buscar"><button>BUSCAR HUESPED</button></a>
            <a href="/huespedes/nuevo"><button>DAR ALTA HUESPED</button></a>
        </div>

        <!-- SECCION PAGOS -->
        <div class="section-box">
            <h3>Pagos</h3>
            <button onclick="maintenance()">FACTURAR</button>
            <button onclick="maintenance()">INGRESAR NOTA CRÉDITO</button>
            <button onclick="maintenance()">INGRESAR PAGO</button> 
        </div>
    </div> 


    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
      <p th:text="${errorMessage}">Validation Error Message</p>
    </div>


    <div th:if="${successMessage}" class="alert alert-success" role="alert">
        <p th:text="${successMessage}">Success Message</p>

    </div>
</div>

<!-- MODAL MANTENIMIENTO -->
<div id="modal-maintenance">
    <div id="modal-box">
        <h3>Funcionalidad en mantenimiento</h3>
        <p>Esta opción aún no está disponible.</p>
        <button onclick="closeModal()">Aceptar</button>
    </div>
</div>

<script>
    function maintenance() {
        document.getElementById("modal-maintenance").style.display = "flex";
    }
    function closeModal() {
        document.getElementById("modal-maintenance").style.display = "none";
    }
</script>

</body>
</html>
