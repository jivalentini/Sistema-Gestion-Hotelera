<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/Base :: head('Ocupar Habitación')}"></head>

  <body>
    <div class="container my-4">
      <!-- TÍTULO -->
      <div class="mb-4">
        <div class="">
          <h2
            class="mb-0"
            th:text="'Seleccionar ocupantes - Habitación N° ' + ${numeroHabitacion}"
          ></h2>
        </div>
      </div>

      <!-- Mensajes -->
      <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <span th:text="${errorMessage}"></span>
      </div>
      <div th:if="${successMessage}" class="alert alert-success" role="alert">
        <span th:text="${successMessage}"></span>
      </div>

      <section>
        <!-- FORMULARIO DE BÚSQUEDA -->
        <div class="card mb-4 shadow-sm">
          <div class="card-header fw-bold">
            <span
              class="h4"
              th:text="${huespedCargado == null ? 'Buscar Huésped' : 'Buscar Acompañante'}"
            ></span>
          </div>
          <div class="card-body">
            <form
              th:action="@{/ocupacion/buscar-huesped}"
              method="post"
              class="row g-3"
            >
              <input type="hidden" name="reservaId" th:value="${reservaId}" />
              <input
                type="hidden"
                name="numeroHabitacion"
                th:value="${numeroHabitacion}"
              />
              <input type="hidden" name="fechaDesde" th:value="${fechaDesde}" />
              <input type="hidden" name="fechaHasta" th:value="${fechaHasta}" />

              <div class="row gx-5 gy-2 align-items-center">
                <div class="col-3">
                  <label for="nombre" class="col-form-label">Nombre</label>
                </div>
                <div class="col-3">
                  <input
                    type="text"
                    class="form-control"
                    name="nombre"
                    th:value="${#strings.toUpperCase(nombre)}"
                    style="text-transform: uppercase;"
                    oninput="this.value = this.value.toUpperCase()"
                  />
                </div>

                <div class="col-3">
                  <label for="apellido" class="col-form-label">Apellido</label>
                </div>
                <div class="col-3">
                  <input
                    type="text"
                    class="form-control"
                    name="apellido"
                    th:value="${#strings.toUpperCase(apellido)}"
                    style="text-transform: uppercase;"
                    oninput="this.value = this.value.toUpperCase()"
                  />
                </div>
              </div>

              <div class="row gx-5 gy-2 align-items-center">
                <div class="col-3">
                  <label for="tipoDocumento" class="col-form-label"
                    >Tipo documento</label
                  >
                </div>
                <div class="col-3">
                  <input
                    type="text"
                    class="form-control"
                    name="tipoDocumento"
                    th:value="${#strings.toUpperCase(tipoDocumento)}"
                    style="text-transform: uppercase;"
                    oninput="this.value = this.value.toUpperCase()"
                  />
                </div>

                <div class="col-3">
                  <label for="documento" class="col-form-label"
                    >Número documento</label
                  >
                </div>
                <div class="col-3">
                  <input
                    type="text"
                    class="form-control"
                    name="documento"
                    th:value="${#strings.toUpperCase(documento)}"
                    style="text-transform: uppercase;"
                    oninput="this.value = this.value.toUpperCase()"
                  />
                </div>
              </div>

              <div class="col-12 text-end">
                <button type="submit" class="btn btn-primary">Buscar</button>
                <a th:href="@{/}" class="btn btn-outline-secondary ms-2"
                  >Cancelar</a
                >
              </div>
            </form>
          </div>
        </div>
      </section>

      <section>
        <!-- RESULTADOS -->
        <div class="card mb-4 shadow-sm">
          <div class="card-header fw-bold">
            <span
              class="h4"
              th:text="${huespedCargado == null ? 'Resultado de la búsqueda (Huésped)' : 'Resultado de la búsqueda (Acompañantes)'}"
            ></span>
          </div>
          <div class="card-body p-0">
            <form th:action="@{/ocupacion/agregar-huesped}" method="post">
              <table
                class="table table-hover table-striped table-bordered mb-0"
              >
                <thead class="table-light">
                  <tr>
                    <th style="width: 50px"></th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="persona : ${personasResultados}">
                    <td class="text-center">
                      <input
                        class="form-check-input"
                        th:type="${huespedCargado == null ? 'radio' : 'checkbox'}"
                        name="personasSeleccionadas"
                        th:value="${persona.id}"
                      />
                    </td>
                    <td th:text="${#strings.toUpperCase(persona.nombre)}"></td>
                    <td th:text="${#strings.toUpperCase(persona.apellido)}"></td>
                  </tr>
                  <tr th:if="${#lists.isEmpty(personasResultados)}">
                    <td colspan="3" class="text-center fw-bold py-3">
                      No se encontraron resultados
                    </td>
                  </tr>
                </tbody>
              </table>
              <div class="p-3 text-end">
                <button type="submit" class="btn btn-success">Aceptar</button>
              </div>
            </form>
          </div>
        </div>
      </section>

      <!-- YA CARGADOS -->
      <section>
        <div class="card mb-4 shadow-sm">
          <div class="card-header fw-bold">
            <span class="h4"> Ocupantes cargados </span>
          </div>
          <div class="card-body">
            <table class="table table-sm">
              <tbody>
                <tr th:each="i : ${ocupantesCargados}">
                  <td th:text="${#strings.toUpperCase(i.nombre + ' ' + i.apellido)}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(ocupantesCargados)}">
                  <td class="text-muted">Aún no hay ocupantes cargados</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- ACCIONES -->
        <div class="text-end mb-5">
          <a
            class="btn btn-primary"
            th:href="@{/ocupacion/resumen-ocupacion}"
            th:classappend="${huespedCargado == null} ? ' disabled' : ''"
          >
            Ir al resumen
          </a>
        </div>
      </section>
    </div>

    <div th:replace="~{fragments/Base :: scripts}"></div>
  </body>
</html>
